name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOPATH: ${{ github.workspace }}/.gopath
      GO111MODULE: off
      CGO_ENABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.x

      - name: Prepare GOPATH
        run: |
          mkdir -p "$GOPATH/src"
          ln -s "$GITHUB_WORKSPACE" "$GOPATH/src/go-msspi"
          git clone --depth 1 --branch v0.0.1 https://github.com/mattn/go-pointer.git "$GOPATH/src/go-pointer"

      - name: Check formatting
        run: |
          test -z "$(gofmt -l msspi.go msspi_cgo.go)"

      - name: Build msspi static libraries
        run: |
          make -C msspi/build_linux -B static static-capix static-cert

      - name: Test
        run: |
          go test -v go-msspi

      - name: Vet
        run: |
          go vet go-msspi
